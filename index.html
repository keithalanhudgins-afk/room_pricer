<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Room Pricer — Freedom Estate Services</title>
<style>
  :root{
    --ink:#1f1a14;
    --paper:#faf6ef;
    --tag:#e8d9b8;
    --tag-edge:#c9b486;
    --red:#b3261e;
    --green:#2e6b3e;
    --muted:#8a7f6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--paper);color:var(--ink);
    min-height:100vh;padding-bottom:120px;
  }
  header{
    background:var(--ink);color:var(--paper);
    padding:14px 16px;display:flex;justify-content:space-between;align-items:center;
    position:sticky;top:0;z-index:50;
  }
  header h1{font-size:17px;font-weight:700;letter-spacing:.3px}
  header h1 span{color:var(--tag);font-weight:400}
  #gearBtn{background:none;border:none;color:var(--paper);font-size:22px;padding:4px 8px}

  /* Settings panel */
  #settings{
    display:none;background:#fff;border-bottom:2px solid var(--tag-edge);
    padding:16px;
  }
  #settings.open{display:block}
  #settings label{display:block;font-size:13px;font-weight:600;margin:12px 0 4px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  #settings input,#settings select{
    width:100%;padding:12px;font-size:16px;border:1px solid var(--tag-edge);
    border-radius:8px;background:var(--paper);
  }
  #settings .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.4}
  #saveSettings{
    margin-top:16px;width:100%;padding:14px;font-size:16px;font-weight:700;
    background:var(--ink);color:var(--paper);border:none;border-radius:10px;
  }

  /* Camera button */
  #captureZone{padding:16px}
  #snapBtn{
    width:100%;padding:22px;font-size:19px;font-weight:700;
    background:var(--green);color:#fff;border:none;border-radius:14px;
    display:flex;align-items:center;justify-content:center;gap:10px;
    box-shadow:0 3px 0 #1d4a29;
  }
  #snapBtn:active{transform:translateY(2px);box-shadow:none}
  #snapBtn:disabled{opacity:.5}
  #status{
    text-align:center;padding:10px 16px;font-size:14px;color:var(--muted);min-height:38px;
  }
  #status.err{color:var(--red);font-weight:600}
  #preview{display:block;max-width:calc(100% - 32px);margin:0 auto 8px;border-radius:10px;max-height:180px}

  /* Item tags */
  #items{padding:0 16px}
  .item{
    background:var(--tag);
    border:1px solid var(--tag-edge);
    border-radius:6px 14px 14px 6px;
    margin-bottom:10px;padding:12px 12px 12px 34px;
    position:relative;display:flex;gap:10px;align-items:center;
  }
  /* the tag hole */
  .item::before{
    content:"";position:absolute;left:11px;top:50%;transform:translateY(-50%);
    width:11px;height:11px;border-radius:50%;
    background:var(--paper);border:2px solid var(--tag-edge);
  }
  .item input[type=checkbox]{width:22px;height:22px;accent-color:var(--green);flex-shrink:0}
  .item .fields{flex:1;min-width:0}
  .item input.name{
    width:100%;border:none;background:transparent;font-size:15px;font-weight:600;
    color:var(--ink);padding:2px 0;border-bottom:1px dashed var(--tag-edge);
  }
  .item input.price{
    width:90px;border:none;background:transparent;
    font-size:24px;font-weight:800;color:var(--red);text-align:right;flex-shrink:0;
  }
  .item .del{
    background:none;border:none;color:var(--muted);font-size:20px;padding:4px;flex-shrink:0;
  }
  #addManual{
    width:100%;padding:12px;margin-top:4px;background:none;
    border:2px dashed var(--tag-edge);border-radius:10px;
    color:var(--muted);font-size:15px;font-weight:600;
  }

  /* Print bar */
  #printBar{
    position:fixed;bottom:0;left:0;right:0;
    background:#fff;border-top:2px solid var(--tag-edge);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:none;
  }
  #printBar.show{display:block}
  #printBtn{
    width:100%;padding:18px;font-size:18px;font-weight:800;
    background:var(--red);color:#fff;border:none;border-radius:12px;
    box-shadow:0 3px 0 #7d1812;
  }
  #printBtn:active{transform:translateY(2px);box-shadow:none}

  /* Print area: hidden on screen, the only thing on paper */
  #printArea{display:none}
  @media print{
    body *{display:none !important}
    #printArea{display:block !important}
    #printArea .label{
      display:flex !important;flex-direction:column;justify-content:center;align-items:center;
      width:62mm;height:29mm;overflow:hidden;
      page-break-after:always;break-after:page;
      font-family:-apple-system,Helvetica,Arial,sans-serif;
      text-align:center;padding:1.5mm;
    }
    #printArea .label .lp{font-size:34pt;font-weight:800;line-height:1}
    #printArea .label .ln{font-size:9pt;font-weight:600;line-height:1.15;max-height:8mm;overflow:hidden;margin-top:1mm}
    #printArea .label .lf{font-size:6pt;letter-spacing:.5px;margin-top:1mm}
    @page{size:62mm 29mm;margin:0}
  }
</style>
</head>
<body>

<header>
  <h1>Room Pricer <span>· Freedom Estate Services</span></h1>
  <button id="gearBtn" aria-label="Settings">⚙︎</button>
</header>

<div id="settings">
  <label for="apiKey">Anthropic API key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-...">
  <div class="hint">Saved on this phone only. Each team member enters it once on their own phone. Get keys at console.anthropic.com.</div>
  <label for="footerText">Label footer</label>
  <input type="text" id="footerText" value="FREEDOM ESTATE SERVICES">
  <button id="saveSettings">Save settings</button>
</div>

<div id="captureZone">
  <input type="file" id="camInput" accept="image/*" capture="environment" hidden>
  <button id="snapBtn">📷 &nbsp;Take photo &amp; price it</button>
</div>

<img id="preview" hidden>
<div id="status">Snap a photo of an item or a whole shelf. Claude prices everything it sees.</div>

<div id="items"></div>
<div style="padding:0 16px">
  <button id="addManual" hidden>+ Add item by hand</button>
</div>

<div id="printBar">
  <button id="printBtn">Print labels</button>
</div>

<div id="printArea"></div>

<script>
const $ = id => document.getElementById(id);
let items = [];

/* ---------- settings ---------- */
$('gearBtn').onclick = () => $('settings').classList.toggle('open');
$('apiKey').value = localStorage.getItem('rp_key') || '';
$('footerText').value = localStorage.getItem('rp_footer') || 'FREEDOM ESTATE SERVICES';
$('saveSettings').onclick = () => {
  localStorage.setItem('rp_key', $('apiKey').value.trim());
  localStorage.setItem('rp_footer', $('footerText').value.trim());
  $('settings').classList.remove('open');
  setStatus('Settings saved.');
};
if (!localStorage.getItem('rp_key')) $('settings').classList.add('open');

function setStatus(msg, isErr){
  $('status').textContent = msg;
  $('status').className = isErr ? 'err' : '';
}

/* ---------- camera & pricing ---------- */
$('snapBtn').onclick = () => {
  if (!localStorage.getItem('rp_key')) {
    $('settings').classList.add('open');
    setStatus('Enter your API key first (one time).', true);
    return;
  }
  $('camInput').click();
};

$('camInput').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  $('snapBtn').disabled = true;
  setStatus('Reading photo…');
  try {
    const b64 = await shrinkToBase64(file, 1280, 0.82);
    $('preview').src = 'data:image/jpeg;base64,' + b64;
    $('preview').hidden = false;
    setStatus('Pricing with Claude…');
    const priced = await priceImage(b64);
    if (!priced.length) { setStatus('No sellable items found. Try a closer shot.', true); }
    else {
      priced.forEach(p => items.push({ name: p.name, price: Number(p.price) || 0, checked: true }));
      render();
      setStatus(priced.length + ' item' + (priced.length>1?'s':'') + ' priced. Edit anything, then print.');
    }
  } catch (err) {
    setStatus('Error: ' + err.message, true);
  } finally {
    $('snapBtn').disabled = false;
  }
};

function shrinkToBase64(file, maxDim, quality){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      res(c.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.onerror = () => rej(new Error('Could not read that photo.'));
    img.src = URL.createObjectURL(file);
  });
}

async function priceImage(b64){
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': localStorage.getItem('rp_key'),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1500,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text', text: 'You are pricing items for an estate sale in Austin, TX. Identify each distinct sellable item in this photo and give a realistic estate sale price (typically 30-50% of fair used/resale value; round to clean numbers like 5, 8, 12, 25, 45). Skip trash, fixtures, and anything clearly not for sale. Respond with ONLY a JSON array, no markdown, no commentary: [{"name":"short label-friendly name","price":12}]' }
        ]
      }]
    })
  });
  if (!resp.ok) {
    const t = await resp.text();
    if (resp.status === 401) throw new Error('API key rejected. Check it in settings.');
    throw new Error('API ' + resp.status + ': ' + t.slice(0,120));
  }
  const data = await resp.json();
  const text = (data.content || []).filter(c => c.type === 'text').map(c => c.text).join('\n');
  const clean = text.replace(/```json|```/g, '').trim();
  const start = clean.indexOf('['), end = clean.lastIndexOf(']');
  if (start === -1 || end === -1) throw new Error('Could not read pricing response.');
  return JSON.parse(clean.slice(start, end + 1));
}

/* ---------- item list ---------- */
function render(){
  const wrap = $('items');
  wrap.innerHTML = '';
  items.forEach((it, i) => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML =
      '<input type="checkbox" ' + (it.checked ? 'checked' : '') + ' data-i="' + i + '" class="chk">' +
      '<div class="fields"><input class="name" data-i="' + i + '" value=""></div>' +
      '<input class="price" data-i="' + i + '" inputmode="decimal" value="">' +
      '<button class="del" data-i="' + i + '">✕</button>';
    wrap.appendChild(div);
    div.querySelector('.name').value = it.name;
    div.querySelector('.price').value = '$' + it.price;
  });
  wrap.querySelectorAll('.chk').forEach(el => el.onchange = e => { items[e.target.dataset.i].checked = e.target.checked; updateBar(); });
  wrap.querySelectorAll('.name').forEach(el => el.oninput = e => { items[e.target.dataset.i].name = e.target.value; });
  wrap.querySelectorAll('.price').forEach(el => {
    el.onfocus = e => { e.target.value = e.target.value.replace('$',''); };
    el.onblur = e => {
      const v = parseFloat(e.target.value.replace(/[^0-9.]/g,'')) || 0;
      items[e.target.dataset.i].price = v;
      e.target.value = '$' + v;
    };
  });
  wrap.querySelectorAll('.del').forEach(el => el.onclick = e => { items.splice(e.target.dataset.i, 1); render(); });
  $('addManual').hidden = false;
  updateBar();
}

$('addManual').onclick = () => { items.push({ name: 'Item', price: 0, checked: true }); render(); };

function updateBar(){
  const n = items.filter(i => i.checked).length;
  $('printBar').classList.toggle('show', n > 0);
  $('printBtn').textContent = 'Print ' + n + ' label' + (n === 1 ? '' : 's');
}

/* ---------- printing ---------- */
$('printBtn').onclick = () => {
  const footer = localStorage.getItem('rp_footer') || 'FREEDOM ESTATE SERVICES';
  const area = $('printArea');
  area.innerHTML = '';
  items.filter(i => i.checked).forEach(it => {
    const d = document.createElement('div');
    d.className = 'label';
    const price = (it.price % 1 === 0) ? '$' + it.price : '$' + it.price.toFixed(2);
    d.innerHTML = '<div class="lp"></div><div class="ln"></div><div class="lf"></div>';
    d.querySelector('.lp').textContent = price;
    d.querySelector('.ln').textContent = it.name;
    d.querySelector('.lf').textContent = footer;
    area.appendChild(d);
  });
  window.print();
};
</script>
</body>
</html>
